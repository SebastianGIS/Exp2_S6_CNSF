name: CI/CD - Build, Push Docker Hub y Deploy en EC2 

on:
  push:
    branches: [ main ]
  workflow_dispatch:    

env:
  IMAGE_NAME: gestion-pedidos

jobs:
  # ─────────────────────────────────────────────────────────────
  #  JOB 1: Compilar y ejecutar tests
  # ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configura Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests y compilar
        run: mvn clean verify

      - name: Subir artefacto JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-build
          path: target/gestion-pedidos-1.0.0.jar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  #  JOB 2: Construir imagen Docker y publicar en Docker Hub
  # ─────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Verificar secrets de Docker Hub
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "::error::Falta el secret DOCKERHUB_USERNAME (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Falta el secret DOCKERHUB_TOKEN. Genera un Access Token con permiso Read & Write en Docker Hub."
            exit 1
          fi
          echo "Secrets de Docker Hub presentes. Usuario: ${{ secrets.DOCKERHUB_USERNAME }}"

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  #  JOB 3: Desplegar la imagen en EC2 (AWS)
  # ─────────────────────────────────────────────────────────────
  deploy-ec2:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    # Solo despliega si estan configurados los secrets del EC2 (opcional).
    if: ${{ vars.DEPLOY_EC2 == 'true' }}
    steps:
      - name: SSH al EC2 y desplegar contenedor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop ${{ env.IMAGE_NAME }} || true
            docker rm   ${{ env.IMAGE_NAME }} || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            docker run -d \
              --name ${{ env.IMAGE_NAME }} \
              --restart unless-stopped \
              -p 80:8080 \
              -e AZURE_ISSUER_URI="${{ secrets.AZURE_ISSUER_URI }}" \
              -e AZURE_JWKS_URI="${{ secrets.AZURE_JWKS_URI }}" \
              -e AZURE_AUDIENCE="${{ secrets.AZURE_AUDIENCE }}" \
              -e AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}" \
              -e AWS_S3_REGION="us-east-1" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            sleep 15
            docker ps | grep ${{ env.IMAGE_NAME }}
            echo "Despliegue completado."
