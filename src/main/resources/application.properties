spring.application.name=gestion-pedidos
server.port=8080

spring.datasource.url=jdbc:h2:mem:guiasdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_ISSUER_URI:https://login.microsoftonline.com/REEMPLAZAR_TENANT_ID/v2.0}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AZURE_JWKS_URI:https://REEMPLAZAR_TENANT.b2clogin.com/REEMPLAZAR_TENANT_ID/discovery/v2.0/keys}
azure.b2c.audience=${AZURE_AUDIENCE:REEMPLAZAR_APPLICATION_CLIENT_ID}
# Nombre del custom claim de rol en el JWT (gestor / consulta)
azure.b2c.role-claim=${AZURE_ROLE_CLAIM:extension_rol}

# -------------------------------------------------------------
#  AWS S3 (PDF de las guias)
# -------------------------------------------------------------
aws.s3.bucket-name=${AWS_S3_BUCKET:REEMPLAZAR_BUCKET_S3}
aws.s3.region=${AWS_S3_REGION:us-east-1}
# Credenciales: dejar VACIO para usar las variables de entorno
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN (recomendado en EC2 y AWS Academy).
aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_SESSION_TOKEN:}

# -------------------------------------------------------------
#  Springdoc / Swagger UI
# -------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# -------------------------------------------------------------
#  Actuator (health)
# -------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Limites de subida de archivos (modificacion de PDF en S3)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
